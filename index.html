<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wordly | Session Gate</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --accent: #2f81f7;
            --danger: #d73a49;
            --text: #c9d1d9;
        }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .setup-card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 20px; }
        
        #input-panel { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 20px; }
        #session-controls { display: none; justify-content: flex-end; margin-bottom: 20px; }
        
        .field { display: flex; flex-direction: column; gap: 5px; flex-grow: 1; }
        input { background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 12px; border-radius: 6px; font-size: 16px; width: 100%; box-sizing: border-box; }
        
        .view-state { display: none; width: 100%; min-height: 500px; border-radius: 8px; overflow: hidden; background: #000; border: 2px solid #30363d; position: relative; }
        .view-state.active { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

        .icon-wait { width: 180px; margin-bottom: 20px; opacity: 0.8; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        iframe { width: 100%; height: 550px; border: none; }
        button.action-btn { cursor: pointer; padding: 12px 24px; border-radius: 6px; border: none; font-weight: bold; background: var(--accent); color: white; }
        button.leave-btn { background: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="setup-card">
        <h1 id="main-title">Wordly | Session Gate</h1>
        
        <div id="input-panel">
            <div class="field">
                <label>Enter Session ID</label>
                <input type="text" id="session-id" placeholder="XXXX-0000" maxlength="9">
            </div>
            <button class="action-btn" id="connect-trigger" onclick="startGate()">Connect & Monitor</button>
        </div>

        <div id="session-controls">
            <button class="action-btn leave-btn" onclick="resetGate()">Leave Session</button>
        </div>

        <div id="view-placeholder" class="view-state active">
            <p>Connect to a session to begin automatic monitoring.</p>
        </div>

        <div id="view-waiting" class="view-state">
            <img src="image_929cb7.png" class="icon-wait" alt="Waiting">
            <h2 id="wait-msg">Monitoring Stream...</h2>
            <div class="spinner"></div>
            <p style="margin-top:20px; color:#8b949e;">Iframe will launch automatically when the host begins.</p>
        </div>

        <div id="view-live" class="view-state">
            <iframe id="wordly-frame" allow="microphone; clipboard-write"></iframe>
        </div>
    </div>
</div>

<script>
    const sidInput = document.getElementById('session-id');
    const frame = document.getElementById('wordly-frame');
    const inputPanel = document.getElementById('input-panel');
    const sessionControls = document.getElementById('session-controls');
    let socket = null;
    let isLive = false;

    // Session ID Formatter
    sidInput.addEventListener('input', (e) => {
        let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        if (val.length > 4) val = val.slice(0, 4) + '-' + val.slice(4, 8);
        e.target.value = val;
    });

    function startGate() {
        const sid = sidInput.value;
        if (sid.length < 9) return alert("Please enter a valid Session ID.");

        isLive = false;
        switchView('view-waiting');
        document.getElementById('connect-trigger').disabled = true;

        if (socket) socket.close();
        
        // Open WebSocket to /attend per API [cite: 35]
        socket = new WebSocket("wss://endpoint.wordly.ai/attend");

        socket.onopen = () => {
            // Handshake with default lang 'en' to satisfy required field [cite: 46, 60]
            socket.send(JSON.stringify({ 
                type: "connect", 
                presentationCode: sid, 
                languageCode: "en" 
            }));
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            // Check success per API [cite: 37, 119]
            if (data.type === "status" && data.success) {
                document.getElementById('wait-msg').innerText = "Session Found. Waiting for content...";
            }

            // Launch on first phrase [cite: 38, 127]
            if (data.type === "phrase" && !isLive) {
                isLive = true;
                launch(sid);
            }

            // Auto-reset on end [cite: 38, 208]
            if (data.type === "end") {
                alert("The session has ended.");
                resetGate();
            }
        };

        socket.onerror = () => resetGate();
    }

    function launch(sid) {
        // Simple URL - language selection occurs inside the iframe [cite: 30]
        const url = `https://attend.wordly.ai/frame/${sid}?enableTTS=false&speakerLanguage=false`;
        frame.src = url;
        
        inputPanel.style.display = 'none';
        sessionControls.style.display = 'flex';
        switchView('view-live');
    }

    function resetGate() {
        isLive = false;
        if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({ type: "disconnect" })); // [cite: 38, 90]
            socket.close();
        }
        frame.src = "";
        document.getElementById('connect-trigger').disabled = false;
        inputPanel.style.display = 'flex';
        sessionControls.style.display = 'none';
        switchView('view-placeholder');
    }

    function switchView(id) {
        document.querySelectorAll('.view-state').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
