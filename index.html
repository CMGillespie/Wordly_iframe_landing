<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wordly | Omnicom Experience</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --accent: #2f81f7;
            --text: #c9d1d9;
        }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text);
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .setup-card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 20px; }
        .input-group { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; }
        .field { display: flex; flex-direction: column; gap: 5px; flex-grow: 1; }
        input, select { background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 12px; border-radius: 6px; font-size: 16px; width: 100%; }
        
        .view-state { display: none; width: 100%; min-height: 500px; border-radius: 8px; background: #000; border: 2px solid #30363d; }
        .view-state.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* Icon Fix: Ensure this matches your file exactly */
        .icon-wait { width: 180px; height: auto; margin-bottom: 20px; }
        
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        iframe { width: 100%; height: 550px; border: none; }
        button.action-btn { cursor: pointer; padding: 12px 24px; border-radius: 6px; border: none; background: var(--accent); color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="setup-card">
        <h1>Wordly | Omnicom Landing</h1>
        
        <div class="input-group">
            <div class="field">
                <label>Session ID</label>
                <input type="text" id="session-id" placeholder="XXXX-0000" maxlength="9">
            </div>
            <div class="field">
                <label>Starting Language</label>
                <select id="lang-picker">
                    <option value="" disabled selected>-- Loading --</option>
                </select>
            </div>
            <button class="action-btn" onclick="connect()">Connect</button>
        </div>

        <div id="view-placeholder" class="view-state active">
            <p>Configure Session ID to begin monitoring.</p>
        </div>

        <div id="view-waiting" class="view-state">
            <img src="image_929cb7.png" class="icon-wait" alt="Waiting for session">
            <h2 id="wait-msg">Connecting...</h2>
            <div class="spinner"></div>
        </div>

        <div id="view-live" class="view-state">
            <iframe id="wordly-frame" allow="microphone; clipboard-write"></iframe>
        </div>
    </div>
</div>

<script>
    const sidInput = document.getElementById('session-id');
    const langPicker = document.getElementById('lang-picker');
    const frame = document.getElementById('wordly-frame');
    let socket = null;

    /**
     * 1. LOAD LANGUAGES (Robust Check)
     * Using both wordlyCode and code to support different JSON formats.
     */
    fetch('languages.json')
        .then(r => r.json())
        .then(data => {
            const list = data.languages || data;
            if (!Array.isArray(list)) throw new Error("Invalid format");
            
            langPicker.innerHTML = '<option value="" disabled selected>-- Select Language --</option>';
            list.forEach(l => {
                let code = l.wordlyCode || l.code;
                let name = l.englishName || l.name;
                if(code && name) {
                    let o = document.createElement('option');
                    o.value = code;
                    o.innerText = name;
                    langPicker.appendChild(o);
                }
            });
        }).catch(e => {
            console.warn("JSON load failed:", e);
            langPicker.innerHTML = '<option value="en">English</option><option value="es">Spanish</option>';
        });

    sidInput.addEventListener('input', (e) => {
        let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        if (val.length > 4) val = val.slice(0, 4) + '-' + val.slice(4, 8);
        e.target.value = val;
    });

    /**
     * 2. WATCHDOG CONNECTION
     * Connects to WSS and listens for data BEFORE opening iframe.
     */
    function connect() {
        const sid = sidInput.value;
        const lang = langPicker.value;
        if (sid.length < 9 || !lang) return alert("Missing Config");

        switchView('view-waiting');
        document.getElementById('wait-msg').innerText = "Waiting for Session: " + sid;

        if (socket) socket.close();
        socket = new WebSocket("wss://endpoint.wordly.ai/present");

        socket.onopen = () => {
            // Handshake
            socket.send(JSON.stringify({
                type: "connect",
                presentationCode: sid
            }));
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            // Flip to live on first transcript or status update
            if (data.type === "transcript" || (data.type === "status" && data.live)) {
                socket.close();
                launch(sid, lang);
            }
        };
    }

    function launch(sid, lang) {
        // Omnicom Parameters: enableTTS=false
        const url = `https://attend.wordly.ai/frame/${sid}?lang=${lang}&enableTTS=false&speakerLanguage=false`;
        frame.src = url;
        switchView('view-live');
    }

    function switchView(id) {
        document.querySelectorAll('.view-state').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
