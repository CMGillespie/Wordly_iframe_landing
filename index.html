<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wordly | Omnicom Managed UX</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --accent: #2f81f7;
            --danger: #d73a49;
            --text: #c9d1d9;
        }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .setup-card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 20px; }
        
        #input-panel { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; }
        #session-controls { display: none; justify-content: flex-end; margin-bottom: 20px; }
        
        .field { display: flex; flex-direction: column; gap: 5px; flex-grow: 1; }
        input, select { background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 12px; border-radius: 6px; font-size: 16px; width: 100%; box-sizing: border-box; }
        
        .view-state { display: none; width: 100%; min-height: 500px; border-radius: 8px; overflow: hidden; background: #000; border: 2px solid #30363d; position: relative; }
        .view-state.active { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

        .icon-wait { width: 180px; margin-bottom: 20px; opacity: 0.8; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        iframe { width: 100%; height: 550px; border: none; }
        button.action-btn { cursor: pointer; padding: 12px 24px; border-radius: 6px; border: none; font-weight: bold; background: var(--accent); color: white; transition: background 0.2s; }
        button.leave-btn { background: var(--danger); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="setup-card">
        <h1 id="main-title">Wordly | Omnicom Session</h1>
        
        <div id="input-panel">
            <div class="field">
                <label>Session ID</label>
                <input type="text" id="session-id" placeholder="XXXX-0000" maxlength="9">
            </div>
            <div class="field">
                <label>Target Language</label>
                <select id="lang-picker">
                    <option value="" disabled selected>-- Loading List --</option>
                </select>
            </div>
            <button class="action-btn" id="connect-trigger" onclick="startAttend()">Connect & Monitor</button>
        </div>

        <div id="session-controls">
            <button class="action-btn leave-btn" onclick="resetApp()">Leave Session</button>
        </div>

        <div id="view-placeholder" class="view-state active">
            <p>Enter Session ID and Language to begin monitoring.</p>
        </div>

        <div id="view-waiting" class="view-state">
            <img src="image_929cb7.png" class="icon-wait" alt="Waiting">
            <h2 id="wait-msg">Connecting...</h2>
            <div class="spinner"></div>
            <p style="margin-top:20px; color:#8b949e;">Monitoring for active translation phrases.</p>
        </div>

        <div id="view-live" class="view-state">
            <iframe id="wordly-frame" allow="microphone; clipboard-write"></iframe>
        </div>
    </div>
</div>

<script>
    const sidInput = document.getElementById('session-id');
    const langPicker = document.getElementById('lang-picker');
    const frame = document.getElementById('wordly-frame');
    const inputPanel = document.getElementById('input-panel');
    const sessionControls = document.getElementById('session-controls');
    let socket = null;
    let isLive = false; // THE GATEKEEPER: Prevents re-launch loops

    fetch('languages.json')
        .then(r => r.json())
        .then(data => {
            const list = data.languages || data;
            langPicker.innerHTML = '<option value="" disabled selected>-- Choose Language --</option>';
            list.forEach(l => {
                let code = l.wordlyCode || l.code;
                let name = l.englishName || l.name;
                if(code && name) {
                    let o = document.createElement('option');
                    o.value = code; o.innerText = name;
                    langPicker.appendChild(o);
                }
            });
        }).catch(e => {
            langPicker.innerHTML = '<option value="en">English (en)</option>';
        });

    sidInput.addEventListener('input', (e) => {
        let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        if (val.length > 4) val = val.slice(0, 4) + '-' + val.slice(4, 8);
        e.target.value = val;
    });

    function startAttend() {
        const sid = sidInput.value;
        const lang = langPicker.value;
        if (sid.length < 9 || !lang) return alert("Missing Config");

        isLive = false; 
        switchView('view-waiting');
        document.getElementById('wait-msg').innerText = "Establishing Connection...";
        document.getElementById('connect-trigger').disabled = true;

        if (socket) socket.close();
        socket = new WebSocket("wss://endpoint.wordly.ai/attend");

        socket.onopen = () => {
            socket.send(JSON.stringify({ 
                type: "connect", 
                presentationCode: sid, 
                languageCode: lang 
            }));
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.type === "status" && data.success) {
                document.getElementById('wait-msg').innerText = "Waiting for presentation content...";
            }

            // TRIGGER: Only launch if we aren't already live 
            if (data.type === "phrase" && !isLive) {
                isLive = true; 
                console.log("WSS: Phrase detected. Stabilizing stream.");
                launch(sid, lang);
            }

            // TRIGGER: Auto-reset on 'end' [cite: 209, 701]
            if (data.type === "end") {
                console.log("WSS: Session end signal received.");
                alert("The session has ended.");
                resetApp();
            }
        };

        socket.onerror = (e) => {
            console.error("WSS Error:", e);
            resetApp();
        };
    }

    function launch(sid, lang) {
        const url = `https://attend.wordly.ai/frame/${sid}?lang=${lang}&enableTTS=false&speakerLanguage=false`;
        frame.src = url;
        inputPanel.style.display = 'none';
        sessionControls.style.display = 'flex';
        switchView('view-live');
    }

    function resetApp() {
        isLive = false;
        if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({ type: "disconnect" }));
            socket.close();
        }
        frame.src = "";
        document.getElementById('connect-trigger').disabled = false;
        inputPanel.style.display = 'flex';
        sessionControls.style.display = 'none';
        switchView('view-placeholder');
    }

    function switchView(id) {
        document.querySelectorAll('.view-state').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
