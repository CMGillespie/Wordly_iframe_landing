<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wordly | Omnicom Landing</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --accent: #2f81f7;
            --text: #c9d1d9;
            --highlight: #f0ad4e;
        }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text);
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        
        .setup-card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 20px; }
        .input-group { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; }
        .field { display: flex; flex-direction: column; gap: 5px; flex-grow: 1; }
        input, select { background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 12px; border-radius: 6px; font-size: 16px; width: 100%; box-sizing: border-box; }
        
        .view-state { display: none; width: 100%; min-height: 500px; border-radius: 8px; overflow: hidden; background: #000; border: 2px solid #30363d; position: relative; }
        .view-state.active { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

        .icon-wait { width: 180px; margin-bottom: 20px; opacity: 0.8; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        iframe { width: 100%; height: 550px; border: none; }
        button.action-btn { cursor: pointer; padding: 12px 24px; border-radius: 6px; border: none; font-weight: bold; background: var(--accent); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="setup-card">
        <h1>Wordly | Omnicom Landing</h1>
        
        <div class="input-group">
            <div class="field">
                <label>Session ID</label>
                <input type="text" id="session-id" placeholder="XXXX-0000" maxlength="9">
            </div>
            <div class="field">
                <label>Target Language</label>
                <select id="lang-picker">
                    <option value="" disabled selected>-- Loading List --</option>
                </select>
            </div>
            <button class="action-btn" onclick="startAttend()">Connect & Monitor</button>
        </div>

        <div id="view-placeholder" class="view-state active">
            <p>Enter Session ID and Language to begin monitoring the presentation.</p>
        </div>

        <div id="view-waiting" class="view-state">
            <img src="image_929cb7.png" class="icon-wait" alt="Waiting">
            <h2 id="wait-msg">Connecting...</h2>
            <div class="spinner"></div>
            <p style="margin-top:20px; color:#8b949e;">Monitoring for active translation phrases.</p>
        </div>

        <div id="view-live" class="view-state">
            <iframe id="wordly-frame" allow="microphone; clipboard-write"></iframe>
        </div>
    </div>
</div>

<script>
    const sidInput = document.getElementById('session-id');
    const langPicker = document.getElementById('lang-picker');
    const frame = document.getElementById('wordly-frame');
    let socket = null;

    /** * 1. LOAD LANGUAGES (Local Asset) 
     * Mapping from your local languages.json using Wordly manifest keys.
     */
    fetch('languages.json')
        .then(r => r.json())
        .then(data => {
            const list = data.languages || data;
            langPicker.innerHTML = '<option value="" disabled selected>-- Choose Language --</option>';
            list.forEach(l => {
                let code = l.wordlyCode || l.code;
                let name = l.englishName || l.name;
                if(code && name) {
                    let o = document.createElement('option');
                    o.value = code;
                    o.innerText = name;
                    langPicker.appendChild(o);
                }
            });
        }).catch(e => {
            console.warn("Local JSON fetch failed. Using emergency fallback.");
            langPicker.innerHTML = '<option value="en">English (en)</option>';
        });

    sidInput.addEventListener('input', (e) => {
        let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        if (val.length > 4) val = val.slice(0, 4) + '-' + val.slice(4, 8);
        e.target.value = val;
    });

    /**
     * 2. ATTEND WATCHDOG (Per API Doc 1.3)
     * Using /attend endpoint to monitor for the first phrase response.
     */
    function startAttend() {
        const sid = sidInput.value;
        const lang = langPicker.value;
        
        if (sid.length < 9 || !lang) return alert("Missing Session ID or Language");

        switchView('view-waiting');
        document.getElementById('wait-msg').innerText = "Establishing Connection...";

        if (socket) socket.close();
        
        // Connect to /attend endpoint [cite: 29, 35]
        socket = new WebSocket("wss://endpoint.wordly.ai/attend");

        socket.onopen = () => {
            console.log("WSS: Opened. Sending 'connect' request...");
            
            // Build connect request per Page 2 of Doc [cite: 47, 48, 49, 60]
            const connectReq = {
                type: "connect",
                presentationCode: sid,
                languageCode: lang
            };
            
            socket.send(JSON.stringify(connectReq));
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            console.log("WSS Message:", data.type);

            // Handle 'status' response [cite: 105, 106, 119]
            if (data.type === "status") {
                if (data.success) {
                    console.log("WSS: Successfully attending. Waiting for phrases...");
                    document.getElementById('wait-msg').innerText = "Waiting for presentation content...";
                } else {
                    console.error("WSS: Error -", data.message);
                    alert("Wordly Error: " + data.message);
                    switchView('view-placeholder');
                    socket.close();
                }
            }

            // Handle 'phrase' response - The life trigger [cite: 127, 128]
            if (data.type === "phrase") {
                console.log("WSS: Content detected. Closing watchdog and launching iframe.");
                socket.close();
                launch(sid, lang);
            }
        };

        socket.onerror = (e) => console.error("WSS Error", e);
    }

    function launch(sid, lang) {
        // Omnicom Parameters: enableTTS=false
        const url = `https://attend.wordly.ai/frame/${sid}?lang=${lang}&enableTTS=false&speakerLanguage=false`;
        frame.src = url;
        switchView('view-live');
    }

    function switchView(id) {
        document.querySelectorAll('.view-state').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
